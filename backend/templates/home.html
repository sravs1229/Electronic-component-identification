<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electronic Component Identification!</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url("/static/images/landing-bg.png") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.3); /* optional dark overlay */
        }

        h1 {
            color: white;
            font-size: 3em;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.7);
            animation: fadeInUp 1.5s ease-out;
        }

        .buttons {
            margin-top: 20px;
            animation: fadeInUp 2.5s ease-out;
        }

        .buttons a {
            text-decoration: none;
            background-color: #007BFF;
            color: white;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease;
        }

        .buttons a:hover {
            background-color: #0056b3;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Electronic Component Identification!</h1>
        <div class="buttons">
            <a href="{{ url_for('signup') }}">Sign Up</a>
            <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
</body>
</html>
